n_layers: 2
n_heads: 2
hidden_size: 64
attribute_hidden_size: [64]
inner_size: 256
hidden_dropout_prob: 0.5
attn_dropout_prob: 0.5
hidden_act: 'gelu'
layer_norm_eps: 1e-12
initializer_range: 0.02
loss_type: 'CE'

selected_features: []
structured_features: []
dense_features: []
dense_feature_paths: {}
pooling_mode: 'sum'

fusion_type: 'sum'     # IRIS v1: sum, concat
combine_type: 'sum'    # IRIS v1: sum, mean, concat
