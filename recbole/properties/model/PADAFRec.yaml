n_layers: 2                     # (int) The number of PADAF transformer layers.
n_heads: 2                      # (int) The number of attention heads.
hidden_size: 64                 # (int) ID and projected feature hidden size.
inner_size: 256                 # (int) Feed-forward inner hidden size.
hidden_dropout_prob: 0.5        # (float) Hidden dropout probability.
attn_dropout_prob: 0.5          # (float) Attention dropout probability.
hidden_act: 'gelu'              # (str) Feed-forward activation.
layer_norm_eps: 1e-12           # (float) LayerNorm epsilon.
initializer_range: 0.02         # (float) Initializer stddev.
loss_type: 'CE'                 # (str) Range in ['BPR', 'CE'].

selected_features: []           # (list of str) Structured + dense feature names in feature order.
structured_features: []         # (list of str) RecBole item token features, e.g. ['category','brand'].
dense_features: []              # (list of str) External cache features, e.g. ['text','image'].
dense_feature_paths: {}         # (dict) feature name -> .npy/.pt matrix path, row index = remapped item id.
pooling_mode: 'sum'             # (str) RecBole FeatureSeqEmbLayer pooling mode.

beta_init: 0.01                 # (float) Initial beta_f value.
use_category_aux: False         # (bool) Enable category branch-specific CE loss.
use_brand_aux: False            # (bool) Enable brand branch-specific CE loss.
category_aux_field: 'category'  # (str) Target item category field name.
brand_aux_field: 'brand'        # (str) Target item brand field name.
lambda_cat: 0.1                 # (float) Category auxiliary weight.
lambda_brand: 0.05              # (float) Brand auxiliary weight.
